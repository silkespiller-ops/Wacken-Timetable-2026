<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wacken Open Air 2026 – Timetable</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Arial,Helvetica,sans-serif}
body{padding:12px;background:#111;color:#eee}
:root{
  --color-border-secondary:#444;
  --color-border-tertiary:#333;
  --color-text-primary:#eee;
  --color-text-secondary:#aaa;
  --color-text-tertiary:#666;
  --color-background-primary:#111;
  --color-background-secondary:#1e1e1e;
  --color-background-warning:#2a2000;
  --color-text-warning:#f0c040;
  --border-radius-md:6px;
}
.top{padding:12px 0 8px}
.tab-bar{display:flex;gap:0;border-bottom:0.5px solid var(--color-border-tertiary);margin-bottom:14px}
.tab{padding:7px 16px;font-size:13px;cursor:pointer;color:var(--color-text-secondary);border-bottom:2px solid transparent;margin-bottom:-1px;background:none;border-top:none;border-left:none;border-right:none;font-family:Arial,Helvetica,sans-serif}
.tab.active{color:var(--color-text-primary);border-bottom-color:var(--color-text-primary)}
.controls{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;align-items:center}
.day-btn{padding:6px 14px;border:1.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;font-size:13px;font-family:Arial,Helvetica,sans-serif;transition:all .15s}
.day-btn.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary);font-weight:600;box-shadow:0 2px 6px rgba(0,0,0,0.18);transform:translateY(-1px)}
.current-day-label{font-size:15px;font-weight:600;color:var(--color-text-primary);margin-bottom:10px;letter-spacing:.01em}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;font-size:12px;color:var(--color-text-secondary)}
.leg-item{display:flex;align-items:center;gap:5px}
.leg-dot{width:10px;height:10px;border-radius:2px}
.header-row{display:flex;border-bottom:0.5px solid var(--color-border-tertiary);padding-bottom:4px;margin-bottom:4px}
.stage-label{font-size:11px;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em;padding:2px 0;width:108px;flex-shrink:0}
.time-axis{display:flex;flex:1;position:relative;height:20px}
.time-tick{font-size:11px;color:var(--color-text-tertiary);position:absolute;transform:translateX(-50%)}
.stage-row{display:flex;align-items:center;min-height:58px;border-bottom:0.5px solid var(--color-border-tertiary)}
.stage-name{width:108px;flex-shrink:0;font-size:12px;color:var(--color-text-secondary);padding-right:8px}
.track{flex:1;position:relative;height:52px}
.slot{position:absolute;height:46px;top:3px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:flex-start;padding:2px 5px;font-size:10px;font-family:Arial,Helvetica,sans-serif;overflow:hidden;white-space:normal;word-break:break-word;line-height:1.3;transition:opacity .15s,transform .1s;border:1px solid transparent;user-select:none;z-index:1}
.slot:hover{z-index:10;transform:scaleY(1.08)}
.slot.fav{outline:2px solid #E24B4A;outline-offset:1px}
.info-bar{margin-top:10px;min-height:36px;padding:8px 12px;background:var(--color-background-secondary);border-radius:var(--border-radius-md);font-size:13px;color:var(--color-text-secondary)}
.clash-warn{margin-top:8px;padding:8px 12px;background:var(--color-background-warning);border-radius:var(--border-radius-md);font-size:12px;color:var(--color-text-warning)}
.sel-empty{font-size:13px;color:var(--color-text-tertiary);padding:24px 0;text-align:center}
.sel-day{margin-bottom:20px}
.sel-day-header{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid var(--color-border-tertiary)}
.sel-cards{display:flex;flex-direction:column;gap:0}
.sel-card{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--border-radius-md);border:0.5px solid transparent;margin-bottom:4px}
.sel-card-stage{font-size:11px;font-weight:500;padding:2px 8px;border-radius:10px;white-space:nowrap;flex-shrink:0;min-width:80px;text-align:center}
.sel-card-time{font-size:12px;color:var(--color-text-secondary);white-space:nowrap;flex-shrink:0;min-width:90px}
.sel-card-name{font-size:13px;font-weight:500;flex:1;color:var(--color-text-primary)}
.sel-card-remove{font-size:11px;color:var(--color-text-tertiary);flex-shrink:0;padding:2px 6px;border-radius:4px;border:0.5px solid var(--color-border-tertiary);cursor:pointer}
.gap-row{display:flex;align-items:center;gap:8px;padding:3px 12px;margin-bottom:4px}
.gap-line{flex:1;height:1px;background:var(--color-border-tertiary)}
.gap-label{font-size:11px;color:var(--color-text-tertiary);white-space:nowrap}
.gap-row.clash .gap-label{color:#E24B4A}
.gap-row.clash .gap-line{background:#E24B4A;opacity:.3}
.sel-header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sel-count{font-size:13px;color:var(--color-text-secondary)}
.clear-all-btn{font-size:12px;font-family:Arial,Helvetica,sans-serif;color:var(--color-text-secondary);cursor:pointer;border:none;background:none;text-decoration:underline;padding:0}
.lu-day-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.lu-day-btn{padding:6px 14px;border:1.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;font-size:13px;font-family:Arial,Helvetica,sans-serif;transition:all .15s}
.lu-day-btn.active{background:var(--color-text-primary);color:var(--color-background-primary);border-color:var(--color-text-primary);font-weight:600;box-shadow:0 2px 6px rgba(0,0,0,0.18);transform:translateY(-1px)}
.lu-day-label{font-size:15px;font-weight:600;color:var(--color-text-primary);margin-bottom:14px}
.lu-stages{display:flex;flex-direction:column;gap:16px}
.lu-stage-block{border-radius:var(--border-radius-md);overflow:hidden;border:0.5px solid transparent}
.lu-stage-header{padding:8px 12px;font-size:13px;font-weight:600;letter-spacing:.03em}
.lu-bands{display:flex;flex-direction:column;gap:0}
.lu-band{display:flex;align-items:center;gap:10px;padding:7px 12px;border-top:0.5px solid rgba(0,0,0,0.06);cursor:pointer;transition:opacity .15s}
.lu-band:hover{opacity:.75}
.lu-band.fav{font-weight:600}
.lu-band-name{flex:1;font-size:13px;color:#111}
.lu-band-time{font-size:12px;opacity:.7;white-space:nowrap}
.lu-band-dur{font-size:11px;opacity:.5;white-space:nowrap}
.lu-band-star{font-size:13px;flex-shrink:0;width:18px;text-align:center}
</style>
</head>
<body>
<div class="top">
<div class="tab-bar">
  <button class="tab active" onclick="switchTab('timetable',this)">Timetable</button>
  <button class="tab" onclick="switchTab('lineup',this)" id="lineupTab">Line-Up</button>
  <button class="tab" onclick="switchTab('auswahl',this)" id="auswahlTab">Meine Auswahl</button>
</div>
<div id="pane-timetable">
  <div class="controls" id="dayBtns"></div>
  <div class="current-day-label" id="currentDayLabel"></div>
  <div class="legend" id="legend"></div>
  <div style="overflow-x:auto;padding-bottom:4px"><div id="grid"></div></div>
  <div class="info-bar" id="infoBar">Klicke auf einen Slot, um ihn zu deiner Merkliste hinzuzufügen.</div>
  <div id="clashWarn"></div>
</div>
<div id="pane-lineup" style="display:none">
  <div class="lu-day-btns" id="luDayBtns"></div>
  <div class="lu-day-label" id="luDayLabel"></div>
  <div class="lu-stages" id="luStages"></div>
</div>
<div id="pane-auswahl" style="display:none">
  <div class="sel-header-row">
    <span class="sel-count" id="selCount">0 Bands ausgewählt</span>
    <button class="clear-all-btn" onclick="clearFavs()">alle löschen</button>
  </div>
  <div id="selContent"></div>
</div>
</div>

  {b:"Vended",s:"Headbangers",st:t(22,30),en:t(23,30)},
  {b:"Triptykon",s:"Louder",st:t(22,45),en:t(24)},
  {b:"Sabaton",s:"Harder",st:t(23),en:t(24,45)},
  {b:"Fit For An Autopsy",s:"W:E:T",st:t(23,45),en:t(24,45)},
  {b:"Hackneyed",s:"Wasteland",st:t(23),en:t(24)},
  {b:"Alestorm",s:"Faster",st:t(25),en:t(26)},
  {b:"The Limit",s:"Headbangers",st:t(25),en:t(26)}
]
};
const DAYS=Object.keys(DATA);
let currentDay=DAYS[0],luDay=DAYS[0],currentTab="timetable";
let favs=new Set();
try{const saved=localStorage.getItem("wacken2026_favs");if(saved)favs=new Set(JSON.parse(saved));}catch(e){}
function saveFavs(){try{localStorage.setItem("wacken2026_favs",JSON.stringify([...favs]));}catch(e){}}
const DAY_BOUNDS={
  "Mi 29.7":{s:t(12),e:t(25,30)},
  "Do 30.7":{s:t(12),e:t(24,30)},
  "Fr 31.7":{s:t(12),e:t(26,30)},
  "Sa 1.8": {s:t(11,30),e:t(26,30)}
};
function pct(m,s,span){return Math.max(0,Math.min(100,(m-s)/span*100))}
function fmtH(m){const h=Math.floor(m/60)%24,mn=m%60;return h+":"+(mn<10?"0":"")+mn}
function fmtDur(min){if(min<60)return `${min} Min.`;const h=Math.floor(min/60),m=min%60;return m>0?`${h} Std. ${m} Min.`:`${h} Std.`}
function fmtGap(min){if(min<=0)return null;if(min<60)return `${min} Min. Pause`;const h=Math.floor(min/60),m=min%60;return m>0?`${h} Std. ${m} Min. Pause`:`${h} Std. Pause`}
function switchTab(tab,el){
  currentTab=tab;
  document.querySelectorAll(".tab").forEach(e=>e.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("pane-timetable").style.display=tab==="timetable"?"block":"none";
  document.getElementById("pane-lineup").style.display=tab==="lineup"?"block":"none";
  document.getElementById("pane-auswahl").style.display=tab==="auswahl"?"block":"none";
  if(tab==="auswahl")renderAuswahl();
  if(tab==="lineup")renderLineup();
}
function renderLegend(){
  document.getElementById("legend").innerHTML=Object.entries(SC).map(([s,c])=>
    `<span class="leg-item"><span class="leg-dot" style="background:${c.bg};border:1px solid ${c.bd}"></span>${s}</span>`
  ).join("");
}
function renderDayBtns(){
  document.getElementById("dayBtns").innerHTML=DAYS.map(d=>
    `<button class="day-btn${d===currentDay?" active":""}" onclick="setDay('${d}')">${d}</button>`
  ).join("");
  document.getElementById("currentDayLabel").textContent=DAY_FULL[currentDay];
}
function setDay(d){currentDay=d;renderDayBtns();renderGrid()}
function buildGridBackground(bounds,span){
  const lines=[];
  for(let m=Math.ceil(bounds.s/60)*60;m<bounds.e;m+=60){
    const x=pct(m,bounds.s,span);
    lines.push(`<line x1="${x}%" y1="0" x2="${x}%" y2="100%" stroke="#cccccc" stroke-width="1"/>`);
  }
  return `<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" style="position:absolute;top:0;left:0;pointer-events:none;z-index:0">${lines.join("")}</svg>`;
}
function renderGrid(){
  const stages=STAGES[currentDay],slots=DATA[currentDay],bounds=DAY_BOUNDS[currentDay],span=bounds.e-bounds.s;
  const g=document.getElementById("grid");
  const ticks=[];
  for(let m=Math.ceil(bounds.s/60)*60;m<=bounds.e;m+=60){
    const h=Math.floor(m/60)%24;
    ticks.push(`<span class="time-tick" style="left:${pct(m,bounds.s,span)}%">${h}:00</span>`);
  }
  const gridBg=buildGridBackground(bounds,span);
  let html=`<div class="header-row"><div class="stage-label"></div><div class="time-axis">${ticks.join("")}</div></div>`;
  stages.forEach(stage=>{
    const c=SC[stage]||{bg:"#eee",bd:"#aaa",tx:"#333"};
    const sh=slots.filter(x=>x.s===stage).map(sl=>{
      const l=pct(sl.st,bounds.s,span),w=Math.max(0.5,pct(sl.en,bounds.s,span)-l);
      return `<div class="slot${favs.has(sl.b)?" fav":""}" style="left:${l}%;width:${w}%;background:${c.bg};border-color:${c.bd};color:${c.tx}" onclick="toggleFav('${sl.b.replace(/'/g,"\\'")}','${stage}')" title="${sl.b} — ${fmtH(sl.st)} – ${fmtH(sl.en)}">${sl.b}</div>`;
    }).join("");
    html+=`<div class="stage-row"><div class="stage-name">${stage}</div><div class="track">${gridBg}${sh}</div></div>`;
  });
  g.innerHTML=html;
  updateClash();
  updateTabLabels();
}
function renderLuDayBtns(){
  document.getElementById("luDayBtns").innerHTML=DAYS.map(d=>
    `<button class="lu-day-btn${d===luDay?" active":""}" onclick="setLuDay('${d}')">${d}</button>`
  ).join("");
  document.getElementById("luDayLabel").textContent=DAY_FULL[luDay];
}
function setLuDay(d){luDay=d;renderLuDayBtns();renderLineup()}
function renderLineup(){
  renderLuDayBtns();
  const slots=DATA[luDay],stages=STAGES[luDay],wrap=document.getElementById("luStages");
  let html="";
  stages.forEach(stage=>{
    const c=SC[stage]||{bg:"#eee",bd:"#aaa",tx:"#333"};
    const stSlots=slots.filter(x=>x.s===stage).sort((a,b)=>a.st-b.st);
    if(!stSlots.length)return;
    const bandsHtml=stSlots.map(sl=>{
      const dur=sl.en-sl.st,isFav=favs.has(sl.b);
      return `<div class="lu-band${isFav?" fav":""}" style="background:${c.bg}${isFav?"":"18"}" onclick="toggleFav('${sl.b.replace(/'/g,"\\'")}','${stage}')">
        <span class="lu-band-star">${isFav?"★":"☆"}</span>
        <span class="lu-band-name" style="color:#eee">${sl.b}</span>
        <span class="lu-band-time" style="color:#aaa">${fmtH(sl.st)} – ${fmtH(sl.en)}</span>
        <span class="lu-band-dur" style="color:#666">${fmtDur(dur)}</span>
      </div>`;
    }).join("");
    html+=`<div class="lu-stage-block" style="border-color:${c.bd}">
      <div class="lu-stage-header" style="background:${c.bg};color:${c.tx}">${stage}</div>
      <div class="lu-bands">${bandsHtml}</div>
    </div>`;
  });
  wrap.innerHTML=html;
}
function toggleFav(band,stage){
  if(favs.has(band)){favs.delete(band);document.getElementById("infoBar").textContent=`${band} entfernt.`;}
  else{favs.add(band);document.getElementById("infoBar").textContent=`✓ ${band} gemerkt!`;}
  saveFavs();
  renderGrid();
  if(currentTab==="lineup")renderLineup();
  if(currentTab==="auswahl")renderAuswahl();
}
function clearFavs(){favs.clear();saveFavs();renderGrid();if(currentTab==="lineup")renderLineup();if(currentTab==="auswahl")renderAuswahl();}
function updateTabLabels(){
  document.getElementById("auswahlTab").textContent=favs.size>0?`Meine Auswahl (${favs.size})`:"Meine Auswahl";
}
function updateClash(){
  const warn=document.getElementById("clashWarn"),clashes=[];
  DAYS.forEach(day=>{
    const fs=DATA[day].filter(x=>favs.has(x.b));
    for(let i=0;i<fs.length;i++)for(let j=i+1;j<fs.length;j++){
      const a=fs[i],b=fs[j];
      if(a.st<b.en&&b.st<a.en)clashes.push(`${day}: ${a.b} ↔ ${b.b}`);
    }
  });
  warn.innerHTML=clashes.length?`<div class="clash-warn">Überschneidung: ${clashes.slice(0,3).join(" | ")}${clashes.length>3?" …":""}</div>`:"";
}
function renderAuswahl(){
  const content=document.getElementById("selContent"),countEl=document.getElementById("selCount");
  updateTabLabels();
  if(favs.size===0){countEl.textContent="0 Bands ausgewählt";content.innerHTML=`<div class="sel-empty">Noch keine Bands ausgewählt.<br>Im Timetable oder Line-Up draufklicken!</div>`;return;}
  countEl.textContent=`${favs.size} Band${favs.size===1?"":"s"} ausgewählt`;
  const clashBands=new Set();
  DAYS.forEach(day=>{
    const fs=DATA[day].filter(x=>favs.has(x.b));
    for(let i=0;i<fs.length;i++)for(let j=i+1;j<fs.length;j++){
      const a=fs[i],b=fs[j];
      if(a.st<b.en&&b.st<a.en){clashBands.add(a.b);clashBands.add(b.b);}
    }
  });
  let html="";
  DAYS.forEach(day=>{
    const ds=DATA[day].filter(x=>favs.has(x.b)).sort((a,b)=>a.st-b.st);
    if(!ds.length)return;
    html+=`<div class="sel-day"><div class="sel-day-header">${DAY_FULL[day]} — ${ds.length} Band${ds.length===1?"":"s"}</div><div class="sel-cards">`;
    ds.forEach((sl,i)=>{
      const c=SC[sl.s]||{bg:"#eee",bd:"#aaa",tx:"#333"};
      if(i>0){
        const gap=sl.st-ds[i-1].en,isOverlap=gap<0;
        const gapTxt=isOverlap?`⚠ Überschneidung (${Math.abs(gap)} Min.)`:fmtGap(gap);
        if(gapTxt)html+=`<div class="gap-row${isOverlap?" clash":""}"><div class="gap-line"></div><span class="gap-label">${gapTxt}</span><div class="gap-line"></div></div>`;
      }
      html+=`<div class="sel-card" style="background:${c.bg}22;border-color:${c.bd}">
        <span class="sel-card-stage" style="background:${c.bg};color:${c.tx};border:1px solid ${c.bd}">${sl.s}</span>
        <span class="sel-card-time">${fmtH(sl.st)} – ${fmtH(sl.en)}</span>
        <span class="sel-card-name">${sl.b}</span>
        <span class="sel-card-remove" onclick="toggleFav('${sl.b.replace(/'/g,"\\'")}','${sl.s}')">✕</span>
      </div>`;
    });
    html+="</div></div>";
  });
  content.innerHTML=html;
}
renderLegend();
renderDayBtns();
renderGrid();
</script>
</body>
</html>
